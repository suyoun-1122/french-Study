<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 720" role="img" aria-label="쁘띠냥, 치즈냥, 라벤더냥">
<defs><style>
.c1{animation:bob1 3.2s ease-in-out infinite}.c2{animation:bob2 3.4s ease-in-out infinite .2s}.c3{animation:bob3 3.1s ease-in-out infinite .4s}
@keyframes bob1{50%{transform:translateY(-10px)}}@keyframes bob2{50%{transform:translateY(-14px)}}@keyframes bob3{50%{transform:translateY(-9px)}}
@media(prefers-reduced-motion:reduce){.c1,.c2,.c3{animation:none}}
</style></defs>
<g class="c1"><image href="petit-animated.svg" x="0" y="90" width="440" height="560"/></g>
<g class="c2"><image href="fromage-animated.svg" x="375" y="20" width="450" height="600"/></g>
<g class="c3"><image href="lavande-animated.svg" x="770" y="85" width="430" height="560"/></g>
</svg>